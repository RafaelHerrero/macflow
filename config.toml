# ╭───────────────────────────────────────────────────────────────╮
# │  Macflow — configuration                                        │
# │  Used at: ~/.config/macflow/config.toml                         │
# │  Save the file and Macflow reloads automatically.               │
# ╰───────────────────────────────────────────────────────────────╯

[settings]
# Modifier applied to the app shortcuts below.
# Combine with "+": "Ctrl", "Ctrl+Option", "Cmd+Shift", etc.
app_modifier = "Ctrl"


# ───────────────────────────── Apps ─────────────────────────────
# Format:  "key" = "App"
#   • The key is usually a digit (1–9, 0), but can be any
#     supported key (letters, F1–F12...).
#   • The App can be the NAME ("Safari") or the BUNDLE ID ("com.apple.Safari").
#   • With app_modifier = "Ctrl", the line "1" = "Safari" binds Ctrl+1 to Safari.
#
# Behavior: if the app is already open, it is focused; otherwise, it is launched.
[apps]
"1" = "Safari"
"2" = "Visual Studio Code"
"3" = "iTerm"
"4" = "Obsidian"
# "5" = "com.apple.Terminal"   # example using a bundle id


# ─────────────────────────── Windows ────────────────────────────
# Format:  action = "shortcut"
# Accepted modifiers: Ctrl, Option (or Alt), Cmd, Shift.
# Keys: arrows (Left/Right/Up/Down), letters, digits, F1–F12,
#       Return, Space, Tab, Escape...
#
# Available actions:
#   Halves.........: left, right, top, bottom
#   Quadrants......: top-left, top-right, bottom-left, bottom-right
#   Thirds.........: left-third, center-third, right-third,
#                    left-two-thirds, right-two-thirds
#   Screen.........: maximize, center
#   Monitors.......: next-monitor, prev-monitor
[windows]
# Halves
left   = "Ctrl+Option+Left"
right  = "Ctrl+Option+Right"
top    = "Ctrl+Option+Up"
bottom = "Ctrl+Option+Down"

# Quadrants
top-left     = "Ctrl+Option+Cmd+Left"
top-right    = "Ctrl+Option+Cmd+Up"
bottom-left  = "Ctrl+Option+Cmd+Down"
bottom-right = "Ctrl+Option+Cmd+Right"

# Thirds (uncomment to use)
# left-third       = "Ctrl+Option+1"
# center-third     = "Ctrl+Option+2"
# right-third      = "Ctrl+Option+3"
# left-two-thirds  = "Ctrl+Option+4"
# right-two-thirds = "Ctrl+Option+5"

# Screen
maximize = "Ctrl+Option+Return"
center   = "Ctrl+Option+C"

# Monitors
next-monitor = "Ctrl+Option+Shift+Right"
prev-monitor = "Ctrl+Option+Shift+Left"
