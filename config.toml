# ╭───────────────────────────────────────────────────────────────╮
# │  Macflow — configuração                                         │
# │  Local de uso: ~/.config/macflow/config.toml                    │
# │  Salve o arquivo e o Macflow recarrega automaticamente.         │
# ╰───────────────────────────────────────────────────────────────╯

[settings]
# Modificador aplicado aos atalhos de apps abaixo.
# Combine com "+": "Ctrl", "Ctrl+Option", "Cmd+Shift", etc.
app_modifier = "Ctrl"


# ───────────────────────────── Apps ─────────────────────────────
# Formato:  "tecla" = "App"
#   • A tecla normalmente é um dígito (1–9, 0), mas pode ser qualquer
#     tecla suportada (letras, F1–F12...).
#   • O App pode ser o NOME ("Safari") ou o BUNDLE ID ("com.apple.Safari").
#   • Com app_modifier = "Ctrl", a linha "1" = "Safari" liga Ctrl+1 ao Safari.
#
# Comportamento: se o app já está aberto, ele é focado; senão, é aberto.
[apps]
"1" = "Safari"
"2" = "Visual Studio Code"
"3" = "iTerm"
"4" = "Obsidian"
# "5" = "com.apple.Terminal"   # exemplo usando bundle id


# ─────────────────────────── Janelas ────────────────────────────
# Formato:  ação = "atalho"
# Modificadores aceitos: Ctrl, Option (ou Alt), Cmd, Shift.
# Teclas: setas (Left/Right/Up/Down), letras, dígitos, F1–F12,
#         Return, Space, Tab, Escape...
#
# Ações disponíveis:
#   Metades........: left, right, top, bottom
#   Quadrantes.....: top-left, top-right, bottom-left, bottom-right
#   Terços.........: left-third, center-third, right-third,
#                    left-two-thirds, right-two-thirds
#   Tela...........: maximize, center
#   Monitores......: next-monitor, prev-monitor
[windows]
# Metades
left   = "Ctrl+Option+Left"
right  = "Ctrl+Option+Right"
top    = "Ctrl+Option+Up"
bottom = "Ctrl+Option+Down"

# Quadrantes
top-left     = "Ctrl+Option+Cmd+Left"
top-right    = "Ctrl+Option+Cmd+Up"
bottom-left  = "Ctrl+Option+Cmd+Down"
bottom-right = "Ctrl+Option+Cmd+Right"

# Terços (descomente para usar)
# left-third       = "Ctrl+Option+1"
# center-third     = "Ctrl+Option+2"
# right-third      = "Ctrl+Option+3"
# left-two-thirds  = "Ctrl+Option+4"
# right-two-thirds = "Ctrl+Option+5"

# Tela
maximize = "Ctrl+Option+Return"
center   = "Ctrl+Option+C"

# Monitores
next-monitor = "Ctrl+Option+Shift+Right"
prev-monitor = "Ctrl+Option+Shift+Left"
